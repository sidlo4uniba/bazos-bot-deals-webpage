  <script>
  (function(){
    function openAll(btn){
      var target = btn.getAttribute('data-target');
      var scope = target === 'all' ? document : document.getElementById(target);
      if (!scope) return;
      var links = scope.querySelectorAll('[data-deal]');
      for (var i = 0; i < links.length; i++) {
        window.open(links[i].href, '_blank', 'noopener');
      }
    }
    document.addEventListener('click', function(e){
      var t = e.target;
      if (t && (t.classList.contains('open-all') || t.classList.contains('open-group'))) {
        openAll(t);
      }
    });
  })();
  </script>
